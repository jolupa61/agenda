<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link class="apple-touch-icon" rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/510/ffffff/journal.png">
    
    <title>Agenda Moleskine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .font-manuscrit { font-family: "Chalkboard SE", "Comic Sans MS", sans-serif; }
        .font-classique { font-family: "Times New Roman", Georgia, serif; }
        .font-moderne { font-family: system-ui, sans-serif; }
        .papier-ligne { background-image: linear-gradient(#c6c6c8 1px, transparent 1px); background-size: 100% 28px; line-height: 28px; }
        .papier-quadrille { background-image: linear-gradient(rgba(198,198,200,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(198,198,200,0.3) 1px, transparent 1px); background-size: 20px 20px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#242426] text-black antialiased flex flex-col pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]" id="corps-application">

    <!-- COUVERTURE FERMÉE -->
    <div id="vue-couverture" class="fixed inset-0 flex items-center justify-center p-6 z-50 bg-[#242426]">
        <button onclick="ouvrirCarnet()" class="w-full max-w-md aspect-[3/4] rounded-2xl relative shadow-2xl flex flex-col items-center justify-between p-8 text-center" id="cuir-couverture">
            <div class="absolute left-0 top-0 bottom-0 w-6 bg-black/30 rounded-l-2xl border-r border-black/10"></div>
            <div class="absolute left-8 top-0 bottom-0 w-0.5 bg-black/10"></div>
            
            <div class="mt-16 flex flex-col items-center gap-4">
                <span class="text-5xl" id="logo-statut">📔</span>
                <h1 class="text-3xl font-serif tracking-[0.3em] font-bold" id="titre-or">AGENDA</h1>
            </div>
            
            <div class="bg-white/5 backdrop-blur-xs text-white/60 text-xs font-semibold tracking-wider uppercase px-6 py-3 rounded-xl border border-white/10 mb-8">
                Ouvrir le carnet
            </div>
            <div class="absolute right-12 top-0 bottom-0 w-3 bg-black/40 shadow-inner"></div>
        </button>
    </div>

    <!-- CARNET OUVERT -->
    <div id="vue-interieur" class="hidden flex-1 flex flex-col p-2 md:p-4 overflow-hidden">
        <!-- Barre supérieure -->
        <header class="w-full flex justify-between items-center mb-2 px-2 text-white h-10 shrink-0">
            <button onclick="fermerCarnet()" class="text-xs bg-white/10 px-3 py-1.5 rounded-lg font-medium">📁 Fermer</button>
            <div class="flex gap-3" id="selecteur-stylos">
                <button onclick="setStylo('encre')" class="w-6 h-6 rounded-full bg-[#1c1c1e] border-2 border-white shadow" id="btn-stylo-encre"></button>
                <button onclick="setStylo('bleu')" class="w-6 h-6 rounded-full bg-[#1d4ed8]" id="btn-stylo-bleu"></button>
                <button onclick="setStylo('vert')" class="w-6 h-6 rounded-full bg-[#15803d]" id="btn-stylo-vert"></button>
                <button onclick="setStylo('rouge')" class="w-6 h-6 rounded-full bg-[#b91c1c]" id="btn-stylo-rouge"></button>
            </div>
            <button onclick="ouvrirReglages()" class="text-xl p-1">⚙️</button>
        </header>

        <!-- Container principal tactile -->
        <main id="zone-tactile" class="w-full flex-1 flex flex-col md:grid md:grid-cols-2 gap-[2px] rounded-xl shadow-2xl relative bg-black/10 overflow-hidden">
            
            <!-- Ruban Signet -->
            <div class="hidden md:block absolute left-1/2 -ml-1 top-0 w-2 h-40 z-30 rounded-b-xs shadow-md" id="ruban-signet"></div>

            <!-- PAGE GAUCHE : L'AGENDA -->
            <section class="p-4 lg:p-6 flex flex-col h-1/2 md:h-full overflow-hidden" id="page-gauche">
                <div class="shrink-0">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <h2 class="text-base font-bold font-serif uppercase tracking-wider" id="label-date-ancre">Mardi 24 Juin 2026</h2>
                            <button onclick="allerAujourdhui()" id="btn-today" class="hidden text-[9px] bg-red-600 text-white font-bold px-2 py-0.5 rounded-full uppercase">Auj</button>
                        </div>
                        <div class="flex gap-4 text-sm font-bold p-1">
                            <button onclick="naviguerDate(-1)" class="px-2 py-1">◀</button>
                            <button onclick="naviguerDate(1)" class="px-2 py-1">▶</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-1 p-1 bg-black/5 rounded-lg text-center text-xs font-semibold mb-2">
                        <button onclick="setMode(0)" id="btn-mode-0" class="py-1 rounded-md text-gray-500">Jour</button>
                        <button onclick="setMode(1)" id="btn-mode-1" class="py-1 rounded-md text-gray-500">Sem.</button>
                        <button onclick="setMode(2)" id="btn-mode-2" class="py-1 rounded-md text-gray-500">Mois</button>
                        <button onclick="setMode(3)" id="btn-mode-3" class="py-1 rounded-md text-gray-500">Année</button>
                    </div>

                    <div id="moleskine-titre-mois" class="hidden text-center text-xs font-serif font-bold tracking-widest uppercase mb-2 opacity-80">
                        JUIN 2026
                    </div>
                </div>

                <!-- Zone d'affichage dynamique défilante -->
                <div id="moteur-agenda" class="flex-1 overflow-y-auto pr-1 no-scrollbar">
                    <!-- Injecté par JavaScript -->
                </div>
            </section>

            <!-- PAGE DROITE : BLOC NOTES -->
            <section class="p-4 lg:p-6 flex flex-col h-1/2 md:h-full border-t md:border-t-0 md:border-l border-black/5 overflow-hidden" id="page-droite">
                <h3 class="text-xs italic font-serif opacity-50 mb-1 shrink-0">Notes</h3>
                <div class="w-full flex-1 relative rounded-lg p-2 overflow-hidden" id="box-fond-papier">
                    <textarea id="zone-notes" oninput="sauverNotes()" class="w-full h-full bg-transparent resize-none border-none outline-none focus:ring-0 p-1" placeholder="Écrire ici..."></textarea>
                </div>
            </section>
        </main>
    </div>

    <!-- MODALE ÉDITEUR RDV -->
    <div id="modale-editeur" class="fixed inset-0 bg-black/60 z-50 hidden backdrop-blur-xs flex items-end sm:items-center justify-center p-4">
        <div class="bg-[#1c1c1e] text-white w-full max-w-md rounded-2xl p-5 space-y-4 shadow-2xl border border-white/10 m-auto">
            <div class="flex justify-between items-center border-b border-white/10 pb-2">
                <h4 id="editeur-titre-mode" class="font-bold text-lg">Événement</h4>
                <button onclick="fermerEditeur()" class="text-blue-400 text-sm font-medium p-1">Annuler</button>
            </div>
            <div class="space-y-3">
                <input type="text" id="form-titre" placeholder="Titre" class="w-full bg-[#2c2c2e] px-3 py-2 rounded-lg text-sm outline-none">
                <input type="text" id="form-lieu" placeholder="Lieu" class="w-full bg-[#2c2c2e] px-3 py-2 rounded-lg text-sm outline-none">
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-xs text-gray-400 block mb-1">Début</label>
                        <input type="time" id="form-debut" class="bg-[#2c2c2e] px-3 py-2 rounded-lg text-sm w-full outline-none">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs text-gray-400 block mb-1">Fin</label>
                        <input type="time" id="form-fin" class="bg-[#2c2c2e] px-3 py-2 rounded-lg text-sm w-full outline-none">
                    </div>
                </div>
                <div>
                    <div class="flex flex-wrap gap-1.5" id="form-cats">
                        <button onclick="setFormCat('Pro')" id="cat-Pro" class="px-2.5 py-1 rounded-full text-xs font-bold border">Pro</button>
                        <button onclick="setFormCat('Perso')" id="cat-Perso" class="px-2.5 py-1 rounded-full text-xs font-bold border">Perso</button>
                        <button onclick="setFormCat('Loisir')" id="cat-Loisir" class="px-2.5 py-1 rounded-full text-xs font-bold border">Loisir</button>
                        <button onclick="setFormCat('Médical')" id="cat-Médical" class="px-2.5 py-1 rounded-full text-xs font-bold border">Médical</button>
                        <button onclick="setFormCat('Important')" id="cat-Important" class="px-2.5 py-1 rounded-full text-xs font-bold border">Important</button>
                    </div>
                </div>
            </div>
            <div class="pt-2 flex gap-2">
                <button onclick="supprimerRDV()" id="btn-supprimer-rdv" class="hidden bg-red-600 py-2.5 px-4 rounded-xl text-sm">🗑️</button>
                <button onclick="validerRDV()" class="flex-1 bg-blue-600 py-2.5 rounded-xl font-bold text-sm text-center">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- MODALE RÉGLAGES -->
    <div id="modale-reglages" class="fixed inset-0 bg-black/60 z-50 hidden backdrop-blur-xs flex items-center justify-center p-4">
        <div class="bg-[#1c1c1e] text-white w-full max-w-md rounded-2xl p-5 space-y-4 max-h-[80vh] overflow-y-auto border border-white/10">
            <div class="flex justify-between items-center border-b border-white/10 pb-2">
                <h3 class="text-base font-bold">Réglages</h3>
                <button onclick="fermerReglages()" class="text-blue-400 font-bold text-sm p-1">OK</button>
            </div>
            <div class="space-y-2">
                <select id="reg-couverture" onchange="changeRegrage('couleurCouverture', this.value)" class="w-full bg-[#2c2c2e] p-2 rounded-lg text-sm outline-none">
                    <option value="noir">🖤 Noir</option>
                    <option value="rouge">❤️ Rouge</option>
                    <option value="blue">💙 Bleu</option>
                </select>
                <select id="reg-papier" onchange="changeRegrage('stylePapier', this.value)" class="w-full bg-[#2c2c2e] p-2 rounded-lg text-sm outline-none">
                    <option value="ligné">📝 Ligné</option>
                    <option value="quadrillé">🔲 Carré</option>
                    <option value="blanc">📄 Blanc</option>
                </select>
                <select id="reg-teinte" onchange="changeRegrage('teintePapier', this.value)" class="w-full bg-[#2c2c2e] p-2 rounded-lg text-sm outline-none">
                    <option value="pop_ivoire">🍦 Ivoire</option>
                    <option value="blanc">🥋 Blanc</option>
                    <option value="kraft">📦 Kraft</option>
                </select>
                <select id="reg-police" onchange="changeRegrage('stylePoliceNotes', this.value)" class="w-full bg-[#2c2c2e] p-2 rounded-lg text-sm outline-none">
                    <option value="manuscrit">✍️ Main</option>
                    <option value="classique">📜 Classique</option>
                    <option value="moderne">📱 Digitale</option>
                </select>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        let settings = {
            stylePapier: localStorage.getItem('stylePapier') || 'ligné',
            teintePapier: localStorage.getItem('teintePapier') || 'pop_ivoire',
            couleurCouverture: localStorage.getItem('couleurCouverture') || 'noir',
            stylePoliceNotes: localStorage.getItem('stylePoliceNotes') || 'manuscrit',
            epaisseurStylo: '1.5',
            couleurRubanSelectionnee: 'rouge',
            couleurStylos: localStorage.getItem('couleurStylos') || 'encre',
            notesSemaine: localStorage.getItem('notesSemaine') || 'Notes :\n- '
        };

        let evenements = JSON.parse(localStorage.getItem('moleskine_events')) || [];
        let modeAffichage = 2; 
        let dateAncre = new Date();
        let selectedFormCat = "Pro";
        let targetRdvId = null;

        const couleursCats = { "Pro": "#3b82f6", "Perso": "#22c55e", "Loisir": "#f97316", "Médical": "#a855f7", "Important": "#ef4444" };
        const encresStylos = { "encre": "#1c1c1e", "bleu": "#1d4ed8", "vert": "#15803d", "rouge": "#b91c1c" };

        function ouvrirCarnet() {
            document.getElementById('vue-couverture').classList.add('hidden');
            document.getElementById('vue-interieur').classList.remove('hidden');
            syncUI();
        }

        function fermerCarnet() {
            document.getElementById('vue-interieur').classList.add('hidden');
            document.getElementById('vue-couverture').classList.remove('hidden');
        }

        function changeRegrage(cle, valeur) {
            settings[cle] = valeur;
            localStorage.setItem(cle, valeur);
            syncUI();
        }

        function setStylo(couleur) {
            settings.couleurStylos = couleur;
            localStorage.setItem('couleurStylos', couleur);
            syncUI();
        }

        function sauverNotes() {
            settings.notesSemaine = document.getElementById('zone-notes').value;
            localStorage.setItem('notesSemaine', settings.notesSemaine);
        }

        function setMode(m) {
            modeAffichage = m;
            for(let i=0; i<4; i++) {
                document.getElementById(`btn-mode-${i}`).className = i === m ? "py-1 rounded-md bg-white shadow-sm font-bold text-black text-xs" : "py-1 rounded-md text-gray-500 text-xs";
            }
            renderAgenda();
        }

        function naviguerDate(delta) {
            if (modeAffichage === 0) dateAncre.setDate(dateAncre.getDate() + delta);
            else if (modeAffichage === 1) dateAncre.setDate(dateAncre.getDate() + (delta * 7));
            else if (modeAffichage === 2) dateAncre.setMonth(dateAncre.getMonth() + delta);
            else if (modeAffichage === 3) dateAncre.setFullYear(dateAncre.getFullYear() + delta);
            syncUI();
        }

        function allerAujourdhui() {
            dateAncre = new Date();
            syncUI();
        }

        function verifierSiFerie(jour, mois, anneeEnCours) {
            const fixes = [[1,1], [1,5], [8,5], [14,7], [15,8], [1,11], [11,11], [25,12]];
            return fixes.some(f => f[0] === jour && f[1] === mois);
        }

        function syncUI() {
            const couverture = document.getElementById('cuir-couverture');
            if(settings.couleurCouverture === 'rouge') couverture.className = "w-full max-w-md aspect-[3/4] rounded-2xl relative shadow-2xl flex flex-col items-center justify-between p-8 text-center bg-[#8b1414] text-[#ffd700]";
            else if(settings.couleurCouverture === 'blue') couverture.className = "w-full max-w-md aspect-[3/4] rounded-2xl relative shadow-2xl flex flex-col items-center justify-between p-8 text-center bg-[#152e46] text-[#ffd700]";
            else couverture.className = "w-full max-w-md aspect-[3/4] rounded-2xl relative shadow-2xl flex flex-col items-center justify-between p-8 text-center bg-[#141416] text-[#ccaa66]";

            const pageG = document.getElementById('page-gauche');
            const pageD = document.getElementById('page-droite');
            let colorCode = "#faf9f5";
            if(settings.teintePapier === 'blanc') colorCode = "#fefefe";
            else if(settings.teintePapier === 'kraft') colorCode = "#e0cbab";
            pageG.style.backgroundColor = colorCode;
            pageD.style.backgroundColor = colorCode;

            document.getElementById('box-fond-papier').className = "w-full flex-1 relative rounded-lg p-2 " + (settings.stylePapier === 'ligné' ? 'papier-ligne' : (settings.stylePapier === 'quadrillé' ? 'papier-quadrille' : ''));

            const zoneNotes = document.getElementById('zone-notes');
            zoneNotes.value = settings.notesSemaine;
            zoneNotes.style.color = encresStylos[settings.couleurStylos];
            
            let fontClass = "font-manuscrit";
            if(settings.stylePoliceNotes === 'classique') fontClass = "font-classique";
            else if(settings.stylePoliceNotes === 'moderne') fontClass = "font-moderne";
            zoneNotes.className = `w-full h-full bg-transparent resize-none border-none outline-none focus:ring-0 p-1 ${fontClass} text-sm`;

            const auj = new Date();
            const estAuj = dateAncre.getDate() === auj.getDate() && dateAncre.getMonth() === auj.getMonth() && dateAncre.getFullYear() === auj.getFullYear();
            document.getElementById('btn-today').style.display = estAuj ? 'none' : 'inline-block';

            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('label-date-ancre').innerText = dateAncre.toLocaleDateString('fr-FR', options);

            const labelMoisSpecifique = document.getElementById('moleskine-titre-mois');
            if (modeAffichage === 2) {
                labelMoisSpecifique.innerText = dateAncre.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
                labelMoisSpecifique.classList.remove('hidden');
            } else {
                labelMoisSpecifique.classList.add('hidden');
            }

            renderAgenda();
        }

        function renderAgenda() {
            const container = document.getElementById('moteur-agenda');
            container.innerHTML = "";
            const couleurEncre = encresStylos[settings.couleurStylos];

            if (modeAffichage === 0) {
                let html = "<div class='space-y-1'>";
                for(let h=7; h<=21; h++) {
                    const rdvH = evenements.filter(r => {
                        let d = new Date(r.date);
                        return d.getDate() === dateAncre.getDate() && d.getMonth() === dateAncre.getMonth() && d.getFullYear() === dateAncre.getFullYear() && r.heureDebut === h;
                    });
                    html += `<div class="flex items-center gap-2 h-10 border-b border-black/5">
                        <span class="text-[11px] font-serif opacity-40 w-10">${String(h).padStart(2, '0')}h</span>
                        <div class="flex-1 h-full flex items-center">`;
                    if(rdvH.length === 0) {
                        html += `<button onclick="ouvrirEditeur(${h})" class="w-full h-full text-left text-black/5 text-xs flex items-center justify-between"><span></span><span>+</span></button>`;
                    } else {
                        rdvH.forEach(r => {
                            html += `<div onclick="ouvrirModif('${r.id}')" class="w-full text-xs font-bold p-1 rounded border-l-4" style="background-color: ${couleursCats[r.categorie]}15; border-color: ${couleursCats[r.categorie]}; color: #1c1c1e">
                                ${r.titre}
                            </div>`;
                        });
                    }
                    html += `</div></div>`;
                }
                container.innerHTML = html + "</div>";

            } else if (modeAffichage === 1) {
                let html = "<div class='space-y-1'>";
                let cal = new Date(dateAncre);
                let jourSem = cal.getDay();
                cal.setDate(cal.getDate() + (jourSem === 0 ? -6 : 1 - jourSem));
                for(let i=0; i<7; i++) {
                    const rdvDuJour = evenements.filter(r => {
                        let d = new Date(r.date);
                        return d.getDate() === cal.getDate() && d.getMonth() === cal.getMonth() && d.getFullYear() === cal.getFullYear();
                    });
                    html += `<div onclick="redirigerJour('${cal.toISOString()}')" class="p-2.5 rounded-lg flex justify-between items-center bg-black/5 border border-black/5">
                        <span class="font-serif font-bold text-xs" style="color: ${couleurEncre}">
                            ${cal.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric' })}
                        </span>
                        ${rdvDuJour.length > 0 ? `<span class="text-[10px] bg-black/10 px-1.5 py-0.5 rounded">${rdvDuJour.length} rdv</span>` : ''}
                    </div>`;
                    cal.setDate(cal.getDate() + 1);
                }
                container.innerHTML = html + "</div>";

            } else if (modeAffichage === 2) {
                let html = `<div class="w-full flex flex-col gap-1 h-full">`;
                html += `<div class="grid grid-cols-7 text-center rounded-md p-1" style="background-color: ${couleurEncre}10">`;
                ["L", "M", "M", "J", "V", "S", "D"].forEach(l => {
                    html += `<div class="text-[10px] font-bold font-serif" style="color: ${couleurEncre}">${l}</div>`;
                });
                html += `</div><div class="grid grid-cols-7 gap-1">`;
                
                let anneeEnCours = dateAncre.getFullYear();
                let moisEnCours = dateAncre.getMonth();
                let premierDuMois = new Date(anneeEnCours, moisEnCours, 1);
                let jourSemainePremier = premierDuMois.getDay();
                let espaceVide = jourSemainePremier === 0 ? 6 : jourSemainePremier - 1;

                for(let e=0; e<espaceVide; e++) { html += `<div></div>`; }
                let nbrJours = new Date(anneeEnCours, moisEnCours + 1, 0).getDate();
                let auj = new Date();

                for(let j=1; j<=nbrJours; j++) {
                    let dateJour = new Date(anneeEnCours, moisEnCours, j);
                    let aRdv = evenements.some(r => {
                        let d = new Date(r.date);
                        return d.getDate() === j && d.getMonth() === moisEnCours && d.getFullYear() === anneeEnCours;
                    });
                    let estAuj = auj.getDate() === j && auj.getMonth() === moisEnCours && auj.getFullYear() === anneeEnCours;
                    
                    html += `<button onclick="redirigerJour('${dateJour.toISOString()}')" class="aspect-square w-full rounded-lg flex flex-col items-center justify-between p-1 border" style="background-color: ${estAuj ? couleurEncre : 'rgba(0,0,0,0.02)'}; border-color: rgba(0,0,0,0.05);">
                        <span class="text-xs font-serif font-bold" style="color: ${estAuj ? '#fff' : couleurEncre}">${j}</span>
                        <div class="w-1 h-1 rounded-full" style="background-color: ${aRdv ? (estAuj ? '#fff' : couleurEncre) : 'transparent'}"></div>
                    </button>`;
                }
                container.innerHTML = html + "</div></div>";
                
            } else if (modeAffichage === 3) {
                let html = `<div class="grid grid-cols-3 gap-1">`;
                for(let m=0; m<12; m++) {
                    let dMois = new Date(dateAncre.getFullYear(), m, 1);
                    html += `<div onclick="redirigerMois(${m})" class="bg-black/5 p-1 rounded-lg text-center">
                        <h4 class="text-[10px] font-bold text-red-700 font-serif uppercase">${dMois.toLocaleDateString('fr-FR', {month: 'short'})}</h4>
                    </div>`;
                }
                container.innerHTML = html + "</div>";
            }
        }

        function redirigerJour(isoStr) { dateAncre = new Date(isoStr); setMode(0); syncUI(); }
        function redirigerMois(mIndex) { dateAncre.setMonth(mIndex); setMode(2); syncUI(); }

        function ouvrirEditeur(heure) {
            targetRdvId = null;
            document.getElementById('editeur-titre-mode').innerText = "Nouvel Événement";
            document.getElementById('form-titre').value = "";
            document.getElementById('form-lieu').value = "";
            document.getElementById('form-debut').value = `${String(heure).padStart(2,'0')}:00`;
            document.getElementById('form-fin').value = `${String(heure+1).padStart(2,'0')}:00`;
            document.getElementById('btn-supprimer-rdv').classList.add('hidden');
            setFormCat('Pro');
            document.getElementById('modale-editeur').style.display = "flex";
        }

        function ouvrirModif(id) {
            const r = evenements.find(x => x.id === id);
            if(!r) return;
            targetRdvId = id;
            document.getElementById('editeur-titre-mode').innerText = "Modifier";
            document.getElementById('form-titre').value = r.titre;
            document.getElementById('form-lieu').value = r.lieu || '';
            document.getElementById('form-debut').value = `${String(r.heureDebut).padStart(2,'0')}:00`;
            document.getElementById('form-fin').value = `${String(r.heureFin).padStart(2,'0')}:00`;
            document.getElementById('btn-supprimer-rdv').classList.remove('hidden');
            setFormCat(r.categorie);
            document.getElementById('modale-editeur').style.display = "flex";
        }

        function fermerEditeur() { document.getElementById('modale-editeur').style.display = "none"; }
        function ouvrirReglages() { document.getElementById('modale-reglages').style.display = "flex"; }
        function fermerReglages() { document.getElementById('modale-reglages').style.display = "none"; }

        function setFormCat(cat) {
            selectedFormCat = cat;
            ["Pro", "Perso", "Loisir", "Médical", "Important"].forEach(c => {
                const btn = document.getElementById(`cat-${c}`);
                btn.style.backgroundColor = c === cat ? couleursCats[c] : "transparent";
                btn.style.color = c === cat ? "#fff" : couleursCats[c];
                btn.style.borderColor = couleursCats[c];
            });
        }

        function validerRDV() {
            const titre = document.getElementById('form-titre').value.trim() || "Sans Titre";
            const lieu = document.getElementById('form-lieu').value.trim();
            const hDeb = parseInt(document.getElementById('form-debut').value.split(':')[0]) || 9;
            const hFin = parseInt(document.getElementById('form-fin').value.split(':')[0]) || 10;

            if(targetRdvId) {
                let match = evenements.find(x => x.id === targetRdvId);
                if(match) { match.titre = titre; match.lieu = lieu; match.categorie = selectedFormCat; match.heureDebut = hDeb; match.heureFin = hFin; }
            } else {
                evenements.push({ id: 'id_' + Date.now(), date: dateAncre.toISOString(), heureDebut: hDeb, heureFin: hFin, titre, lieu, categorie: selectedFormCat });
            }
            localStorage.setItem('moleskine_events', JSON.stringify(evenements));
            fermerEditeur();
            syncUI();
        }

        function supprimerRDV() {
            if(confirm("Supprimer ?") && targetRdvId) {
                evenements = evenements.filter(x => x.id !== targetRdvId);
                localStorage.setItem('moleskine_events', JSON.stringify(evenements));
                fermerEditeur();
                syncUI();
            }
        }

        // --- DÉTECTION DU SWIPE REPENSIE POUR L'IPHONE ---
        let startX = 0;
        let startY = 0;

        document.getElementById('zone-tactile').addEventListener('touchstart', function(e) {
            if (e.target.id === 'zone-notes') return;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, {passive: true});

        document.getElementById('zone-tactile').addEventListener('touchend', function(e) {
            if (e.target.id === 'zone-notes') return;
            let diffX = e.changedTouches[0].clientX - startX;
            let diffY = e.changedTouches[0].clientY - startY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 40) {
                if (diffX > 0) naviguerDate(-1); // Swipe à droite -> page précédente
                else naviguerDate(1); // Swipe à gauche -> page suivante
            }
        }, {passive: true});

        setMode(2);
        syncUI();
    </script>
</body>
</html>
